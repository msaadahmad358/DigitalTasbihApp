name: tasbeeh
description: Digital Tasbih App - Islamic Dhikr Counter

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  device_preview: ^1.3.1
  url_launcher: ^6.1.7
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/tasbih_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#00B4DB"
  adaptive_icon_foreground: "assets/images/tasbih_icon.png"